<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>HI • KAT | Products</title>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#5B1A9C">

  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <script src="config.js"></script>

  <script src="common.js" defer></script>

  <script src="supabase.js" defer></script>
  <script src="productPopup.js" defer></script>
  <style>
    body{background:#fff;padding-bottom:95px}

    .products-header{
      padding:22px 28px;
      display:grid;
      grid-template-columns:45px 220px 1fr 45px 45px 45px;
      align-items:center;
      gap:18px;
      background:#fff;
    }

    .menu-btn,.header-action{
      font-size:30px;
      color:#111827;
      background:none;
      position:relative;
      border:0;
    }

    .products-logo .brand-logo{font-size:42px;letter-spacing:4px}
    .products-logo .brand-tagline{font-size:15px;margin-top:2px;letter-spacing:1px}

    .search-box{
      height:55px;
      border:1.5px solid #e5e7eb;
      border-radius:18px;
      display:flex;
      align-items:center;
      gap:12px;
      padding:0 22px;
      color:#6b7280;
      font-size:18px;
      background:#fff;
    }

    .search-box i{font-size:24px}
    .search-box input{border:0;outline:0;width:100%;font-size:17px;background:transparent}

    .cart-badge{
      position:absolute;
      top:-8px;
      right:-8px;
      width:24px;
      height:24px;
      background:#8b1bb3;
      color:#fff;
      border-radius:50%;
      font-size:13px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:700;
    }

    .products-container{padding:0 30px}

    .breadcrumb{
      color:#6b7280;
      font-size:16px;
      display:flex;
      gap:10px;
      align-items:center;
      margin:14px 0 10px;
    }

    .products-top{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:20px;
      margin-bottom:22px;
    }

    .products-top h1{font-size:34px;line-height:1.1;margin-bottom:10px}
    .products-top p{color:#6b7280;font-size:16px}

    .sort-filter{display:flex;align-items:center;gap:16px}

    .sort-box{display:flex;align-items:center;gap:10px;color:#111827;font-size:15px}

    .sort-box select{
      height:48px;
      min-width:160px;
      border:1px solid #e5e7eb;
      border-radius:12px;
      padding:0 16px;
      background:#fff;
      font-size:15px;
      outline:none;
    }

    .filter-btn{
      height:48px;
      padding:0 24px;
      border-radius:12px;
      background:#faf5ff;
      color:#5B1A9C;
      border:1px solid #ead8ff;
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:700;
      font-size:15px;
    }

    .category-row{
      display:grid;
      grid-template-columns:130px repeat(5,1fr) 96px;
      gap:18px;
      margin-bottom:28px;
    }

    .category-card{
      height:130px;
      border:1px solid #e5e7eb;
      border-radius:16px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:10px;
      background:#fff;
      cursor:pointer;
      transition:.2s ease;
    }

    .category-card.active{
      background:#faf5ff;
      border-color:#8b1bb3;
      box-shadow:0 8px 24px rgba(91,26,156,.08);
    }

    .category-card img{
      width:72px;
      height:72px;
      border-radius:50%;
      object-fit:cover;
    }

    .category-card i{font-size:46px;color:#6D28D9}
    .category-card span{font-weight:600;font-size:15px}

    .filter-panel{
      border:1px solid #e5e7eb;
      border-radius:16px;
      box-shadow:0 6px 22px rgba(0,0,0,.06);
      padding:18px 24px;
      margin-bottom:28px;
      background:#fff;
    }

    .filter-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      border-bottom:1px solid #eee;
    }

    .filter-grid.bottom{border-bottom:0}

    .filter-item{
      display:flex;
      align-items:center;
      gap:18px;
      min-height:78px;
      padding:0 22px;
      border-right:1px solid #eee;
      cursor:pointer;
      background:#fff;
    }

    .filter-item:nth-child(3n){border-right:0}
    .filter-icon{font-size:28px;color:#111827}
    .filter-label{flex:1}
    .filter-label strong{display:block;font-size:16px;margin-bottom:4px}
    .filter-label span{color:#6b7280;font-size:14px}
    .filter-item .arrow{font-size:22px}

    .clear-filter{
      color:#5B1A9C;
      font-weight:700;
      display:flex;
      align-items:center;
      gap:10px;
      justify-content:center;
      border:0;
    }

    .products-grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:24px;
      min-height:220px;
    }

    .product-card{
      background:#fff;
      border-radius:10px;
      overflow:hidden;
      box-shadow:0 4px 15px rgba(0,0,0,.08);
      border:1px solid #eee;
      position:relative;
      cursor:pointer;
    }

    .product-img{
      height:260px;
      background:#f8f8f8;
      position:relative;
      overflow:hidden;
    }

    .product-img img{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .wish-btn{
      position:absolute;
      top:14px;
      right:14px;
      width:36px;
      height:36px;
      border-radius:50%;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:23px;
      z-index:2;
      border:0;
    }

    .new-label{
      position:absolute;
      left:12px;
      top:12px;
      background:#8b1bb3;
      color:#fff;
      padding:6px 10px;
      border-radius:5px;
      font-size:13px;
      font-weight:600;
      z-index:2;
    }

    .product-info{padding:14px 12px 16px}
    .product-info h3{font-size:16px;font-weight:500;margin-bottom:9px}

    .price-row{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:10px;
      flex-wrap:wrap;
    }

    .sell-price{font-size:21px;font-weight:800;color:#111827}
    .old-price{font-size:14px;color:#888;text-decoration:line-through}
    .discount{font-size:13px;color:#16A34A;font-weight:700}

    .short-desc{
      color:#6b7280;
      font-size:14px;
      line-height:1.45;
      min-height:38px;
    }

    .rating{
      display:flex;
      gap:8px;
      align-items:center;
      font-size:14px;
      color:#555;
      margin-top:10px;
    }

    .rating i{color:#f7a600}

    .pagination{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:14px;
      margin:36px 0 12px;
    }

    .page-btn{
      width:45px;
      height:45px;
      border-radius:50%;
      background:#fff;
      border:1px solid #eee;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:16px;
      color:#111827;
    }

    .page-btn.active{background:#5B1A9C;color:#fff;border-color:#5B1A9C}
    .bottom-nav{grid-template-columns:repeat(5,1fr)}

    .empty-box{
      grid-column:1/-1;
      text-align:center;
      padding:60px 20px;
      color:#6b7280;
      background:#faf5ff;
      border-radius:18px;
    }

    @media(max-width:768px){
      .products-header{
        grid-template-columns:38px 1fr 38px 38px;
        padding:16px;
      }

      .search-box{grid-column:1/-1;order:2}
      .products-logo .brand-logo{font-size:34px}
      .products-container{padding:0 14px}
      .products-top{align-items:flex-start;flex-direction:column}
      .sort-filter{width:100%;justify-content:space-between}

      .category-row{
        display:flex;
        overflow-x:auto;
        gap:14px;
        padding-bottom:6px;
      }

      .category-card{min-width:110px;height:110px}
      .category-card img{width:62px;height:62px}

      .filter-grid,.filter-grid.bottom{
        grid-template-columns:1fr;
        border-bottom:0;
      }

      .filter-item{
        border-right:0;
        border-bottom:1px solid #eee;
      }

      .filter-grid.bottom .filter-item:last-child{border-bottom:0}

      .products-grid{
        grid-template-columns:repeat(2,1fr);
        gap:14px;
      }

      .product-img{height:215px}
    }
  </style>

</head>

<body>

  <div class="top-shipping-bar">
    <i class="ri-truck-line"></i>
    <span>FREE SHIPPING on every product</span>
  </div>

  <header class="products-header">
    <button class="menu-btn"><i class="ri-menu-line"></i></button>

<div class="products-logo">
  <div class="brand-logo">HI<span class="brand-dot">•</span>KAT</div>
  <div class="brand-tagline">Wear Your Story</div>
</div>

<div class="search-box">
  <i class="ri-search-line"></i>
  <input type="search" id="searchInput" placeholder="Search for products..." oninput="filterProducts()">
</div>

<button class="header-action"><i class="ri-heart-line"></i></button>

<button class="header-action" onclick="goCart()">
  <i class="ri-shopping-cart-line"></i>
  <span class="cart-badge" id="cartBadge">0</span>
</button>

<button class="header-action" onclick="goProfile()">
  <i class="ri-user-line"></i>
</button>

  </header>

  <main class="products-container">

<div class="breadcrumb">
  <span>Home</span>
  <i class="ri-arrow-right-s-line"></i>
  <span>Products</span>
</div>

<section class="products-top">
  <div>
    <h1>All Products</h1>
    <p id="productCountText">Loading products...</p>
  </div>

  <div class="sort-filter">
    <div class="sort-box">
      <span>Sort by</span>
      <select id="sortSelect" onchange="sortProducts()">
        <option value="popular">Popular</option>
        <option value="newest">Newest First</option>
        <option value="low">Price Low to High</option>
        <option value="high">Price High to Low</option>
      </select>
    </div>

    <button class="filter-btn" onclick="showToast('Filter coming soon')">
      <i class="ri-equalizer-line"></i>
      Filter
    </button>
  </div>
</section>

<section class="category-row">
  <button class="category-card active" onclick="selectCategory(this,'All')">
    <i class="ri-function-line"></i>
    <span>All</span>
  </button>

  <button class="category-card" onclick="selectCategory(this,'Sarees')">
    <img src="https://images.unsplash.com/photo-1610189018260-3da95f27d957?auto=format&fit=crop&w=300&q=80">
    <span>Sarees</span>
  </button>

  <button class="category-card" onclick="selectCategory(this,'Kurtis')">
    <img src="https://images.unsplash.com/photo-1583391733956-6c78276477e2?auto=format&fit=crop&w=300&q=80">
    <span>Kurtis</span>
  </button>

  <button class="category-card" onclick="selectCategory(this,'Dresses')">
    <img src="https://images.unsplash.com/photo-1594633312681-425c7b97ccd1?auto=format&fit=crop&w=300&q=80">
    <span>Dresses</span>
  </button>

  <button class="category-card" onclick="selectCategory(this,'Tops')">
    <img src="https://images.unsplash.com/photo-1564257631407-4deb1f99d992?auto=format&fit=crop&w=300&q=80">
    <span>Tops</span>
  </button>

  <button class="category-card" onclick="selectCategory(this,'Lehenga')">
    <img src="https://images.unsplash.com/photo-1595777457583-95e059d581b8?auto=format&fit=crop&w=300&q=80">
    <span>Lehenga</span>
  </button>

  <button class="category-card" onclick="showToast('More categories coming soon')">
    <i class="ri-arrow-down-s-line"></i>
    <span>More</span>
  </button>
</section>

<section class="filter-panel">
  <div class="filter-grid">
    <div class="filter-item" onclick="showToast('Price filter will open')">
      <i class="ri-price-tag-3-line filter-icon"></i>
      <div class="filter-label">
        <strong>Price</strong>
        <span>₹ Min - ₹ Max</span>
      </div>
      <i class="ri-arrow-down-s-line arrow"></i>
    </div>

    <div class="filter-item" onclick="showToast('Size filter will open')">
      <i class="ri-ruler-line filter-icon"></i>
      <div class="filter-label">
        <strong>Size</strong>
        <span>All Sizes</span>
      </div>
      <i class="ri-arrow-down-s-line arrow"></i>
    </div>

    <div class="filter-item" onclick="showToast('Offer filter will open')">
      <i class="ri-discount-percent-line filter-icon"></i>
      <div class="filter-label">
        <strong>Offers</strong>
        <span>All Offers</span>
      </div>
      <i class="ri-arrow-down-s-line arrow"></i>
    </div>
  </div>

  <div class="filter-grid bottom">
    <div class="filter-item" onclick="showToast('Availability filter will open')">
      <i class="ri-box-3-line filter-icon"></i>
      <div class="filter-label">
        <strong>Availability</strong>
        <span>In Stock</span>
      </div>
      <i class="ri-arrow-down-s-line arrow"></i>
    </div>

    <div class="filter-item" onclick="showToast('Rating filter will open')">
      <i class="ri-star-line filter-icon"></i>
      <div class="filter-label">
        <strong>Rating</strong>
        <span>All Ratings</span>
      </div>
      <i class="ri-arrow-down-s-line arrow"></i>
    </div>

    <button class="filter-item clear-filter" onclick="clearFilters()">
      <i class="ri-refresh-line"></i>
      <span>Clear All</span>
    </button>
  </div>
</section>

<section class="products-grid" id="productsGrid">
  <div class="empty-box">Loading products...</div>
</section>

<div class="pagination">
  <button class="page-btn"><i class="ri-arrow-left-s-line"></i></button>
  <button class="page-btn active">1</button>
  <button class="page-btn"><i class="ri-arrow-right-s-line"></i></button>
</div>

  </main>

  <nav class="bottom-nav">
    <button class="nav-item" onclick="goHome()">
      <i class="ri-home-5-line"></i>
      <span>Home</span>
    </button>

<button class="nav-item active" onclick="goProducts()">
  <i class="ri-shopping-bag-fill"></i>
  <span>Products</span>
</button>

<button class="nav-item" onclick="goCart()">
  <i class="ri-shopping-cart-line"></i>
  <span>Cart</span>
</button>

<button class="nav-item" onclick="goOrders()">
  <i class="ri-box-3-line"></i>
  <span>Orders</span>
</button>

<button class="nav-item" onclick="goProfile()">
  <i class="ri-user-line"></i>
  <span>Profile</span>
</button>

  </nav>

  <script>
    let allProducts = [];
    let currentProducts = [];
    let currentCategory = "All";

    document.addEventListener("DOMContentLoaded", function () {
      loadProductsFromSupabase();
      updateCartBadge();
    });

    async function loadProductsFromSupabase() {
      const grid = document.getElementById("productsGrid");
      grid.innerHTML = '<div class="empty-box">Loading products...</div>';

      try {
        if (typeof getProducts !== "function") {
          throw new Error("getProducts function not found");
        }

        allProducts = await getProducts();
        currentProducts = [...allProducts];

        renderProducts(currentProducts);
        updateProductCount(currentProducts.length);

      } catch (error) {
        console.error("Product Load Error:", error);
        grid.innerHTML = '<div class="empty-box">Failed to load products</div>';
        showToast("Failed to load products");
      }
    }

    function renderProducts(products) {
      const grid = document.getElementById("productsGrid");

      if (!products || products.length === 0) {
        grid.innerHTML = '<div class="empty-box">No products found</div>';
        updateProductCount(0);
        return;
      }

      grid.innerHTML = products.map(product => {
        const image = product.image1 || product.image || "icon-512.png";
        const name = product.product_name || product.name || "Product";
        const price = Number(product.price || 0);
        const category = product.category || "All";
        const shortDesc = product.description1 || "";
        const offer = product.offer || product.offerType || "New";

        return `
          <div class="product-card"
               data-id="${product.product_id}"
               data-category="${category}"
               data-price="${price}"
               onclick="openProductCard('${product.product_id}')">

            <button class="wish-btn" onclick="event.stopPropagation(); showToast('Wishlist coming soon')">
              <i class="ri-heart-line"></i>
            </button>

            <span class="new-label">${offer}</span>

            <div class="product-img">
              <img src="${image}" alt="${name}">
            </div>

            <div class="product-info">
              <h3>${name}</h3>

              <div class="price-row">
                <span class="sell-price">₹${price}</span>
              </div>

              <p class="short-desc">${shortDesc}</p>

              <div class="rating">
                <i class="ri-star-fill"></i>
                4.6 <span>(New)</span>
              </div>
            </div>
          </div>
        `;
      }).join("");

      updateProductCount(products.length);
    }

    function openProductCard(productId) {
      const product = allProducts.find(p => p.product_id === productId);

      if (!product) {
        showToast("Product not found");
        return;
      }

      if (typeof saveProductView === "function") {
        saveProductView(product).catch(err => {
          console.warn("View save failed", err);
        });
      }

      if (typeof openProductPopup === "function") {
        openProductPopup(product);
      } else {
        showToast(product.product_name || product.name || "Product");
      }
    }

    function selectCategory(button, category) {
      document.querySelectorAll(".category-card").forEach(btn => {
        btn.classList.remove("active");
      });

      button.classList.add("active");
      currentCategory = category;
      filterProducts();
    }

    function filterProducts() {
      const search = document.getElementById("searchInput").value.toLowerCase();

      currentProducts = allProducts.filter(product => {
        const name = (product.product_name || product.name || "").toLowerCase();
        const category = product.category || "";

        const matchSearch = name.includes(search);
        const matchCategory = currentCategory === "All" || category === currentCategory;

        return matchSearch && matchCategory;
      });

      renderProducts(currentProducts);
    }

    function sortProducts() {
      const sortValue = document.getElementById("sortSelect").value;

      if (sortValue === "low") {
        currentProducts.sort((a, b) => Number(a.price || 0) - Number(b.price || 0));
      }

      if (sortValue === "high") {
        currentProducts.sort((a, b) => Number(b.price || 0) - Number(a.price || 0));
      }

      if (sortValue === "newest" || sortValue === "popular") {
        currentProducts = [...currentProducts];
      }

      renderProducts(currentProducts);
      showToast("Sorting applied");
    }

    function clearFilters() {
      currentCategory = "All";
      document.getElementById("searchInput").value = "";

      document.querySelectorAll(".category-card").forEach(btn => {
        btn.classList.remove("active");
      });

      document.querySelector(".category-card").classList.add("active");

      currentProducts = [...allProducts];
      renderProducts(currentProducts);

      showToast("Filters cleared");
    }

    function updateProductCount(count) {
      document.getElementById("productCountText").innerText =
        count === 1
          ? "Showing 1 product"
          : "Showing " + count + " products";
    }

    function updateCartBadge() {
      const badge = document.getElementById("cartBadge");
      const cart = JSON.parse(localStorage.getItem("hikat_cart_items") || "[]");
      badge.innerText = cart.length;
    }

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js");
      });
    }
  </script>

</body>
</html>
